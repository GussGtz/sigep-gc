services:
  - type: web
    name: sigep-gc
    runtime: node
    buildCommand: npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      # Estas las configuras manualmente en el dashboard de Render:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: RECAPTCHA_SECRET_KEY
        sync: false
      - key: VITE_RECAPTCHA_SITE_KEY
        sync: false
