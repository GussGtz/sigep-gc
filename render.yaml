services:
  - type: web
    name: sigep-gc
    runtime: node
    # --include=dev es NECESARIO en el frontend porque vite está en devDependencies
    # y Render instala con NODE_ENV=production (que omite devDeps por defecto)
    buildCommand: >
      cd vue-app && npm install --include=dev && npm run build &&
      cd ../Backend_SIGEP-GC && npm install --omit=dev
    startCommand: node Backend_SIGEP-GC/server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      # Estas las configuras manualmente en el dashboard de Render:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: RECAPTCHA_SECRET_KEY
        sync: false
      - key: VITE_RECAPTCHA_SITE_KEY
        sync: false
